<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahbar profili</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f5f7fa; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.1); }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white; padding: 25px 20px; text-align: center; position: relative;
        }
        .back-btn {
            position: absolute; left: 20px; top: 25px;
            background: rgba(255,255,255,0.2); border: none; color: white;
            width: 40px; height: 40px; border-radius: 50%; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .back-btn:hover { background: rgba(255,255,255,0.35); }

        .profile-section {
            display: flex; flex-direction: column; align-items: center;
            padding: 30px 20px 20px;
            border-bottom: 1px solid #eee;
        }
        .avatar {
            width: 100px; height: 100px; border-radius: 50%;
            background: linear-gradient(135deg, #2a5298, #1e3c72);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 42px; margin-bottom: 15px;
            box-shadow: 0 6px 16px rgba(42,82,152,0.3);
        }
        .rahbar-ism { font-size: 22px; font-weight: 700; color: #1e3c72; margin-bottom: 5px; }
        .rahbar-lavozim {
            background: #e8f0fe; color: #2a5298; padding: 5px 15px;
            border-radius: 20px; font-size: 14px; font-weight: 600;
        }

        .info-list { padding: 20px; }
        .info-item {
            display: flex; align-items: center; gap: 15px;
            padding: 14px 0; border-bottom: 1px solid #f0f0f0;
        }
        .info-item:last-child { border-bottom: none; }
        .info-icon { width: 36px; height: 36px; border-radius: 50%; background: #e8f0fe;
            display: flex; align-items: center; justify-content: center; color: #2a5298; font-size: 16px; flex-shrink: 0; }
        .info-label { font-size: 13px; color: #888; margin-bottom: 2px; }
        .info-value { font-size: 15px; font-weight: 600; color: #333; }

        .xabar-section { padding: 20px; }
        .xabar-section h3 { font-size: 18px; color: #1e3c72; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; font-weight: 500; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 12px 14px; border: 1.5px solid #dde3ef;
            border-radius: 8px; font-size: 15px; transition: border 0.2s; outline: none;
        }
        .form-group input:focus, .form-group textarea:focus { border-color: #2a5298; }
        .form-group textarea { resize: vertical; min-height: 110px; }
        .send-btn {
            width: 100%; padding: 13px; background: #2a5298; color: white; border: none;
            border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.2s;
        }
        .send-btn:hover { background: #1e3c72; }
        .send-btn:disabled { background: #9ab0d6; cursor: not-allowed; }

        .alert {
            padding: 12px 16px; border-radius: 8px; margin-top: 14px;
            font-size: 14px; display: none;
        }
        .alert.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
        .alert.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }

        .loading { text-align: center; padding: 40px; color: #888; }
        .footer { text-align: center; padding: 20px; color: #999; font-size: 13px; border-top: 1px solid #eee; }

        .mening-xabarlarim { padding: 20px; border-top: 1px solid #eee; }
        .mening-xabarlarim h3 { font-size: 16px; color: #1e3c72; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .mxabar-item {
            background: #f8f9fa; border-radius: 8px; padding: 12px 14px;
            margin-bottom: 10px; border-left: 4px solid #aaa; font-size: 14px;
        }
        .mxabar-item.kutilmoqda { border-left-color: #e67e22; }
        .mxabar-item.tasdiqlangan { border-left-color: #27ae60; }
        .mxabar-item.bekor_qilingan { border-left-color: #e74c3c; }
        .mxabar-holat { font-weight: 600; margin-bottom: 4px; }
        .mxabar-holat.kutilmoqda { color: #e67e22; }
        .mxabar-holat.tasdiqlangan { color: #27ae60; }
        .mxabar-holat.bekor_qilingan { color: #e74c3c; }
        .mxabar-matn { color: #555; margin-bottom: 4px; }
        .mxabar-javob { color: #2a5298; font-style: italic; margin-top: 4px; }
    </style>
</head>
<body>
<div class="container">
    <header class="header">
        <button class="back-btn" onclick="window.location.href='/pasport/'">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h1><i class="fas fa-id-card"></i> Rahbar profili</h1>
        <p>Mahalla xodimi ma'lumotlari</p>
    </header>

    <div id="loading" class="loading">
        <i class="fas fa-spinner fa-spin fa-2x"></i><br>Ma'lumotlar yuklanmoqda...
    </div>

    <div id="profil-kontent" style="display:none;">
        <div class="profile-section">
            <div class="avatar"><i id="avatar-icon" class="fas fa-user-tie"></i></div>
            <div class="rahbar-ism" id="rahbar-ism">—</div>
            <div class="rahbar-lavozim" id="rahbar-lavozim">—</div>
        </div>

        <div class="info-list">
            <div class="info-item" id="telefon-blok" style="display:none;">
                <div class="info-icon"><i class="fas fa-phone"></i></div>
                <div>
                    <div class="info-label">Telefon</div>
                    <div class="info-value" id="rahbar-telefon">—</div>
                </div>
            </div>
            <div class="info-item">
                <div class="info-icon"><i class="fas fa-briefcase"></i></div>
                <div>
                    <div class="info-label">Lavozim tavsifi</div>
                    <div class="info-value" id="rahbar-tavsif">—</div>
                </div>
            </div>
        </div>

        <div class="xabar-section">
            <h3><i class="fas fa-paper-plane"></i> Xabar yuborish</h3>
            <form id="xabar-form">
                <div class="form-group">
                    <label>Sizning ismingiz <span style="color:red">*</span></label>
                    <input type="text" id="yuboruvchi-ism" placeholder="To'liq ismingizni kiriting" required>
                </div>
                <div class="form-group">
                    <label>Telefon raqamingiz</label>
                    <input type="tel" id="yuboruvchi-telefon" placeholder="+998 90 123 45 67">
                </div>
                <div class="form-group">
                    <label>Xabar matni <span style="color:red">*</span></label>
                    <textarea id="xabar-matn" placeholder="Xabaringizni yozing..." required></textarea>
                </div>
                <button type="submit" class="send-btn" id="send-btn">
                    <i class="fas fa-paper-plane"></i> Xabar yuborish
                </button>
                <div id="alert-box" class="alert"></div>
            </form>
        </div>
    </div>

    <div class="mening-xabarlarim" id="mening-xabarlarim" style="display:none;">
        <h3><i class="fas fa-history"></i> Mening yuborgan xabarlarim</h3>
        <div id="mx-list"></div>
    </div>

    <footer class="footer">
        <p>© 2026 Smart mahalla axborot tizimi</p>
    </footer>
</div>

<script>
const LAVOZIM_ICONS = {
    rais: 'fa-user-tie',
    hokim_yordamchisi: 'fa-user-shield',
    yoshlar: 'fa-users',
    xotin_qizlar: 'fa-female',
    profilaktika: 'fa-user-shield',
    boshqa: 'fa-user',
};

function getRahbarId() {
    // /rahbar/8/ shaklidan olish
    const pathMatch = window.location.pathname.match(/\/rahbar\/(\d+)\//);
    if (pathMatch) return pathMatch[1];
    // ?id=8 shaklidan olish
    const params = new URLSearchParams(window.location.search);
    return params.get('id');
}

async function loadRahbar(id) {
    try {
        const res = await fetch(`/api/rahbarlar/${id}/`);
        if (!res.ok) throw new Error('Topilmadi');
        return await res.json();
    } catch (e) {
        return null;
    }
}

function getSaqlangan(id) {
    const key = `xabarlar_rahbar_${id}`;
    return JSON.parse(localStorage.getItem(key) || '[]');
}
function saqlash(id, xabarId) {
    const key = `xabarlar_rahbar_${id}`;
    const arr = getSaqlangan(id);
    if (!arr.includes(xabarId)) arr.push(xabarId);
    localStorage.setItem(key, JSON.stringify(arr));
}

async function loadMeningXabarlarim(rahbarId) {
    const ids = getSaqlangan(rahbarId);
    if (!ids.length) return;

    const blok = document.getElementById('mening-xabarlarim');
    const list = document.getElementById('mx-list');
    blok.style.display = 'block';

    try {
        const res = await fetch(`/api/rahbarlar/${rahbarId}/xabar/`);
        const hammasi = await res.json();
        const mening = hammasi.filter(x => ids.includes(x.id));
        if (!mening.length) { blok.style.display = 'none'; return; }

        const holatIcons = { kutilmoqda: '⏳', tasdiqlangan: '✅', bekor_qilingan: '❌' };
        list.innerHTML = mening.map(x => `
            <div class="mxabar-item ${x.holat}">
                <div class="mxabar-holat ${x.holat}">${holatIcons[x.holat]} ${x.holat_display}</div>
                <div class="mxabar-matn">${x.matn}</div>
                ${x.javob ? `<div class="mxabar-javob"><i class="fas fa-reply"></i> Javob: ${x.javob}</div>` : ''}
            </div>`).join('');
    } catch {}
}

async function init() {
    const id = getRahbarId();
    if (!id) { showError('Rahbar ID ko\'rsatilmagan'); return; }

    const rahbar = await loadRahbar(id);
    document.getElementById('loading').style.display = 'none';

    if (!rahbar) { showError('Rahbar topilmadi'); return; }

    document.title = rahbar.ismi + ' — Profil';
    document.getElementById('rahbar-ism').textContent = rahbar.ismi;
    document.getElementById('rahbar-lavozim').textContent = rahbar.lavozim_display || rahbar.lavozim;
    document.getElementById('rahbar-tavsif').textContent = rahbar.lavozim_tavsifi || rahbar.lavozim_display || '—';

    const iconKey = rahbar.lavozim in LAVOZIM_ICONS ? rahbar.lavozim : 'boshqa';
    document.getElementById('avatar-icon').className = `fas ${LAVOZIM_ICONS[iconKey]}`;

    if (rahbar.telefon) {
        document.getElementById('rahbar-telefon').textContent = rahbar.telefon;
        document.getElementById('telefon-blok').style.display = 'flex';
    }

    document.getElementById('profil-kontent').style.display = 'block';
    loadMeningXabarlarim(id);

    document.getElementById('xabar-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('send-btn');
        const alertEl = document.getElementById('alert-box');
        alertEl.className = 'alert';
        alertEl.textContent = '';

        const ism = document.getElementById('yuboruvchi-ism').value.trim();
        const tel = document.getElementById('yuboruvchi-telefon').value.trim();
        const matn = document.getElementById('xabar-matn').value.trim();

        if (!ism || !matn) {
            alertEl.className = 'alert error';
            alertEl.textContent = 'Ism va xabar matni kiritilishi shart!';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Yuborilmoqda...';

        try {
            const res = await fetch(`/api/rahbarlar/${id}/xabar/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ yuboruvchi_ism: ism, yuboruvchi_telefon: tel, matn }),
            });
            const data = await res.json();
            if (res.ok) {
                if (data.id) saqlash(id, data.id);
                alertEl.className = 'alert success';
                alertEl.textContent = 'Xabar muvaffaqiyatli yuborildi! Holatini pastda kuzatishingiz mumkin.';
                document.getElementById('xabar-form').reset();
                loadMeningXabarlarim(id);
            } else {
                throw new Error(JSON.stringify(data));
            }
        } catch {
            alertEl.className = 'alert error';
            alertEl.textContent = 'Xabar yuborishda xatolik yuz berdi. Qayta urinib ko\'ring.';
        }

        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> Xabar yuborish';
    });
}

function showError(msg) {
    document.getElementById('loading').innerHTML = `<i class="fas fa-exclamation-circle" style="color:#e74c3c;font-size:2em"></i><br>${msg}`;
}

init();
</script>
<script src="/static/sidebar.js"></script>
</body>
</html>
