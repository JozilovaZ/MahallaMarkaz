{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Foydalanuvchi boshqaruvi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 30px;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        .admin-card {
            background: white;
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
        }
        h1 { color: #1e3c72; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 2px solid #e5e7eb; }
        .form-row { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
        .form-group { flex: 1; min-width: 200px; }
        label { display: block; margin-bottom: 8px; color: #374151; font-weight: 600; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
        }
        input:focus { border-color: #2a5298; }
        button {
            background: #2a5298;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #1e3c72; transform: translateY(-2px); }
        .btn-delete { background: #dc2626; padding: 6px 14px; font-size: 12px; }
        .btn-delete:hover { background: #b91c1c; transform: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th, td { border: 1px solid #e5e7eb; padding: 12px; text-align: left; }
        th { background: #f3f4f6; color: #374151; font-weight: 600; }
        tr:hover { background: #f9fafb; }
        .message { padding: 12px 18px; border-radius: 12px; margin-top: 20px; }
        .message.success { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
        .message.error { background: #fee2e2; color: #991b1b; border-left: 4px solid #dc2626; }
        .stats { background: #e0e7ff; padding: 10px 18px; border-radius: 12px; display: inline-block; margin: 20px 0 10px 0; font-weight: 500; }
        .empty-row { text-align: center; padding: 40px; color: #9ca3af; }
    </style>
</head>
<body>
<div class="container">
    <div class="admin-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap;gap:10px;">
            <h1>&#128081; Admin Panel - Foydalanuvchi qo'shish</h1>
            <div style="display:flex;gap:10px;">
                <a href="{% url 'admin_panel' %}"
                   style="background:#2a5298;color:white;padding:9px 18px;border-radius:10px;text-decoration:none;font-size:14px;font-weight:500;">
                    <i class="fas fa-arrow-left"></i> Admin paneliga qaytish
                </a>
                <button onclick="if(confirm('Chiqishni xohlaysizmi?')) logout();"
                    style="background:#dc2626;color:white;border:none;padding:9px 18px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;">
                    <i class="fas fa-sign-out-alt"></i> Chiqish
                </button>
            </div>
        </div>
        <div class="subtitle">Foydalanuvchilarni qo'shish, ko'rish va o'chirish</div>

        <div class="form-row">
            <div class="form-group">
                <label>&#128100; Ism familiya</label>
                <input type="text" id="fullname" placeholder="Masalan: Nilufar Shodieva">
            </div>
            <div class="form-group">
                <label>&#128231; Login (email yoki username)</label>
                <input type="text" id="login" placeholder="Masalan: nilush123@gmail.com">
            </div>
            <div class="form-group">
                <label>&#128274; Parol</label>
                <input type="text" id="password" placeholder="Parol">
            </div>
            <div class="form-group" style="display: flex; align-items: flex-end;">
                <button id="addUserBtn">&#10133; Qo'shish</button>
            </div>
        </div>

        <div id="messageBox"></div>

        <div class="stats" id="userCount">&#128101; Jami: 0 ta foydalanuvchi</div>

        <div style="overflow-x: auto;">
            <table id="usersTable">
                <thead>
                    <tr><th>#</th><th>Ism familiya</th><th>Login</th><th>Parol</th><th>Qo'shilgan vaqt</th><th>Amal</th></tr>
                </thead>
                <tbody id="usersList"></tbody></table>
        </div>
    </div>
</div>

<script src="{% static 'api.js' %}"></script>
<script>
    requireAdmin();

    async function loadUsers() {
        const res = await apiFetch('/auth/users/');
        if (!res || !res.ok) return;
        const users = await res.json();
        renderUsersTable(users);
    }

    function renderUsersTable(users) {
        const tbody = document.getElementById('usersList');
        document.getElementById('userCount').textContent = `👥 Jami: ${users.length} ta foydalanuvchi`;
        if (!users.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty-row">📭 Hech qanday foydalanuvchi yo\'q.</td></tr>';
            return;
        }
        tbody.innerHTML = '';
        users.forEach((user, index) => {
            const row = tbody.insertRow();
            row.insertCell(0).textContent = index + 1;
            row.insertCell(1).textContent = user.fullname;
            row.insertCell(2).textContent = user.email;
            row.insertCell(3).textContent = user.role;
            row.insertCell(4).textContent = user.created_at ? new Date(user.created_at).toLocaleString('uz-UZ') : '—';
            const deleteCell = row.insertCell(5);
            const btn = document.createElement('button');
            btn.textContent = 'O\'chirish';
            btn.className = 'btn-delete';
            btn.onclick = () => deleteUser(user.id, user.fullname);
            deleteCell.appendChild(btn);
        });
    }

    async function deleteUser(id, name) {
        if (!confirm(`"${name}" ni o'chirishni xohlaysizmi?`)) return;
        const res = await apiFetch('/auth/users/' + id + '/delete/', { method: 'DELETE' });
        if (res && (res.ok || res.status === 204)) {
            showMessage(`"${name}" o'chirildi`, false);
            loadUsers();
        }
    }

    function showMessage(msg, isError) {
        const msgDiv = document.getElementById('messageBox');
        msgDiv.innerHTML = `<div class="message ${isError ? 'error' : 'success'}">${msg}</div>`;
        setTimeout(() => { msgDiv.innerHTML = ''; }, 3000);
    }

    document.getElementById('addUserBtn').addEventListener('click', async () => {
        const fullname = document.getElementById('fullname').value.trim();
        const email = document.getElementById('login').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!fullname || !email || !password) {
            showMessage("❌ Barcha maydonlarni to'ldiring!", true);
            return;
        }

        const res = await apiFetch('/auth/users/create/', {
            method: 'POST',
            body: JSON.stringify({ fullname, email, password }),
        });

        if (res && res.ok) {
            showMessage(`✅ "${fullname}" qo'shildi!`, false);
            document.getElementById('fullname').value = '';
            document.getElementById('login').value = '';
            document.getElementById('password').value = '';
            loadUsers();
        } else {
            const err = await res.json();
            showMessage('❌ ' + JSON.stringify(err), true);
        }
    });

    document.getElementById('password').addEventListener('keypress', e => {
        if (e.key === 'Enter') document.getElementById('addUserBtn').click();
    });

    loadUsers();
</script>
<script src="{% static 'sidebar.js' %}"></script>
</body>
</html>
