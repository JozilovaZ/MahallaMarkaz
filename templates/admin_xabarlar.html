{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcha murojatlar — Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f6fb; color: #222; }

        .page-wrap { max-width: 1000px; margin: 0 auto; padding: 30px 20px; }

        .page-header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white; padding: 24px 28px; border-radius: 14px;
            margin-bottom: 28px; display: flex; align-items: center; gap: 14px;
        }
        .page-header i { font-size: 28px; opacity: .85; }
        .page-header h1 { font-size: 22px; font-weight: 700; }
        .page-header p { font-size: 14px; opacity: .75; margin-top: 3px; }

        .filters {
            display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: center;
        }
        .filter-btn {
            padding: 8px 18px; border: 1.5px solid #dde3ef; border-radius: 8px;
            background: white; font-size: 14px; cursor: pointer; font-weight: 500;
            color: #555; transition: all .15s;
        }
        .filter-btn:hover { border-color: #2a5298; color: #2a5298; }
        .filter-btn.active { background: #2a5298; border-color: #2a5298; color: white; }
        .search-box {
            flex: 1; min-width: 200px; padding: 9px 14px; border: 1.5px solid #dde3ef;
            border-radius: 8px; font-size: 14px; outline: none;
        }
        .search-box:focus { border-color: #2a5298; }

        .stats-row {
            display: flex; gap: 14px; margin-bottom: 24px; flex-wrap: wrap;
        }
        .stat-box {
            background: white; border-radius: 10px; padding: 16px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,.07); flex: 1; min-width: 130px;
            border-top: 3px solid #ddd; text-align: center;
        }
        .stat-box.kutilmoqda { border-top-color: #e67e22; }
        .stat-box.tasdiqlangan { border-top-color: #27ae60; }
        .stat-box.bekor_qilingan { border-top-color: #e74c3c; }
        .stat-box.jami { border-top-color: #2a5298; }
        .stat-num { font-size: 28px; font-weight: 800; }
        .stat-box.kutilmoqda .stat-num { color: #e67e22; }
        .stat-box.tasdiqlangan .stat-num { color: #27ae60; }
        .stat-box.bekor_qilingan .stat-num { color: #e74c3c; }
        .stat-box.jami .stat-num { color: #2a5298; }
        .stat-label { font-size: 13px; color: #888; margin-top: 4px; }

        .xabar-list { display: flex; flex-direction: column; gap: 12px; }
        .xabar-card {
            background: white; border-radius: 12px; padding: 18px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,.07); border-left: 4px solid #ddd;
        }
        .xabar-card.kutilmoqda { border-left-color: #e67e22; }
        .xabar-card.tasdiqlangan { border-left-color: #27ae60; }
        .xabar-card.bekor_qilingan { border-left-color: #e74c3c; }

        .xabar-top {
            display: flex; align-items: flex-start; justify-content: space-between;
            gap: 12px; margin-bottom: 10px; flex-wrap: wrap;
        }
        .xabar-sender { font-weight: 700; font-size: 15px; color: #1e3c72; }
        .xabar-tel { font-size: 13px; color: #888; margin-top: 2px; }
        .holat-badge {
            padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
            white-space: nowrap;
        }
        .holat-badge.kutilmoqda { background: #fff3e0; color: #e67e22; }
        .holat-badge.tasdiqlangan { background: #e8f5e9; color: #27ae60; }
        .holat-badge.bekor_qilingan { background: #fce4e4; color: #e74c3c; }

        .xabar-rahbar {
            font-size: 13px; color: #2a5298; font-weight: 600;
            margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
        }
        .xabar-matn { font-size: 14px; color: #444; line-height: 1.6; margin-bottom: 8px; }
        .xabar-javob {
            font-size: 13px; color: #2a5298; font-style: italic;
            background: #f0f4ff; padding: 8px 12px; border-radius: 8px; margin-bottom: 8px;
        }
        .xabar-meta { font-size: 12px; color: #aaa; }

        .xabar-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .action-btn {
            padding: 7px 16px; border: none; border-radius: 7px;
            font-size: 13px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 6px; transition: opacity .15s;
        }
        .action-btn:hover { opacity: .85; }
        .btn-tasdiq { background: #27ae60; color: white; }
        .btn-bekor { background: #e74c3c; color: white; }
        .btn-javob { background: #2a5298; color: white; }

        .javob-form {
            margin-top: 12px; display: none;
        }
        .javob-form textarea {
            width: 100%; padding: 10px 12px; border: 1.5px solid #dde3ef;
            border-radius: 8px; font-size: 14px; outline: none; resize: vertical;
            min-height: 80px; font-family: inherit;
        }
        .javob-form textarea:focus { border-color: #2a5298; }
        .javob-form-btns { display: flex; gap: 8px; margin-top: 8px; }

        .empty-state { text-align: center; padding: 60px 20px; color: #aaa; }
        .empty-state i { font-size: 48px; margin-bottom: 12px; }
        .loading { text-align: center; padding: 40px; color: #888; }

        #access-denied {
            text-align: center; padding: 80px 20px; color: #e74c3c;
            font-size: 18px; display: none;
        }
    </style>
</head>
<body>
<div class="page-wrap">
    <div id="access-denied">
        <i class="fas fa-lock fa-3x" style="margin-bottom:16px;display:block"></i>
        Bu sahifa faqat adminlar uchun. <a href="/login/" style="color:#2a5298">Kirish</a>
    </div>

    <div id="main-content" style="display:none">
        <div class="page-header">
            <i class="fas fa-list-check"></i>
            <div>
                <h1>Barcha murojatlar</h1>
                <p>Mahalla mas'ullariga yuborilgan barcha xabarlar</p>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-box jami">
                <div class="stat-num" id="st-jami">0</div>
                <div class="stat-label">Jami</div>
            </div>
            <div class="stat-box kutilmoqda">
                <div class="stat-num" id="st-kutilmoqda">0</div>
                <div class="stat-label">Kutilmoqda</div>
            </div>
            <div class="stat-box tasdiqlangan">
                <div class="stat-num" id="st-tasdiqlangan">0</div>
                <div class="stat-label">Tasdiqlangan</div>
            </div>
            <div class="stat-box bekor_qilingan">
                <div class="stat-num" id="st-bekor">0</div>
                <div class="stat-label">Bekor qilingan</div>
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-holat="">Barchasi</button>
            <button class="filter-btn" data-holat="kutilmoqda">⏳ Kutilmoqda</button>
            <button class="filter-btn" data-holat="tasdiqlangan">✅ Tasdiqlangan</button>
            <button class="filter-btn" data-holat="bekor_qilingan">❌ Bekor qilingan</button>
            <input type="text" class="search-box" id="search-input" placeholder="Ism yoki xabar bo'yicha qidirish...">
        </div>

        <div id="loading" class="loading">
            <i class="fas fa-spinner fa-spin fa-2x"></i><br>Yuklanmoqda...
        </div>
        <div class="xabar-list" id="xabar-list"></div>
    </div>
</div>

<script src="{% static 'api.js' %}"></script>
<script>
let allXabarlar = [];
let activeHolat = '';

function getToken() { return localStorage.getItem('access_token'); }
function getUser()  { try { return JSON.parse(localStorage.getItem('current_user')); } catch { return null; } }

const holatDisplay = { kutilmoqda: 'Kutilmoqda', tasdiqlangan: 'Tasdiqlangan', bekor_qilingan: 'Bekor qilingan' };
const holatIcons   = { kutilmoqda: '⏳', tasdiqlangan: '✅', bekor_qilingan: '❌' };

async function loadXabarlar() {
    const token = getToken();
    try {
        const res = await fetch('/api/xabarlar/', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) throw new Error();
        allXabarlar = await res.json();
        document.getElementById('loading').style.display = 'none';
        updateStats();
        renderList();
    } catch {
        document.getElementById('loading').innerHTML = '<i class="fas fa-exclamation-circle" style="color:#e74c3c"></i> Ma\'lumotlarni yuklashda xatolik';
    }
}

function updateStats() {
    document.getElementById('st-jami').textContent = allXabarlar.length;
    document.getElementById('st-kutilmoqda').textContent = allXabarlar.filter(x => x.holat === 'kutilmoqda').length;
    document.getElementById('st-tasdiqlangan').textContent = allXabarlar.filter(x => x.holat === 'tasdiqlangan').length;
    document.getElementById('st-bekor').textContent = allXabarlar.filter(x => x.holat === 'bekor_qilingan').length;
}

function renderList() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const list = document.getElementById('xabar-list');

    let filtered = allXabarlar.filter(x => {
        if (activeHolat && x.holat !== activeHolat) return false;
        if (search) {
            const hay = (x.yuboruvchi_ism + ' ' + x.matn + ' ' + (x.rahbar_ismi || '')).toLowerCase();
            if (!hay.includes(search)) return false;
        }
        return true;
    });

    if (!filtered.length) {
        list.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><br>Xabar topilmadi</div>';
        return;
    }

    list.innerHTML = filtered.map(x => `
        <div class="xabar-card ${x.holat}" id="xcard-${x.id}">
            <div class="xabar-top">
                <div>
                    <div class="xabar-sender"><i class="fas fa-user"></i> ${x.yuboruvchi_ism}</div>
                    ${x.yuboruvchi_telefon ? `<div class="xabar-tel"><i class="fas fa-phone"></i> ${x.yuboruvchi_telefon}</div>` : ''}
                </div>
                <span class="holat-badge ${x.holat}">${holatIcons[x.holat]} ${holatDisplay[x.holat]}</span>
            </div>
            <div class="xabar-rahbar"><i class="fas fa-id-badge"></i> ${x.rahbar_ismi || '—'}: ${x.rahbar_lavozim || ''}</div>
            <div class="xabar-matn">${x.matn}</div>
            ${x.javob ? `<div class="xabar-javob"><i class="fas fa-reply"></i> Javob: ${x.javob}</div>` : ''}
            <div class="xabar-meta"><i class="fas fa-clock"></i> ${new Date(x.yuborilgan_vaqt).toLocaleString('uz-UZ')}</div>
            ${x.holat === 'kutilmoqda' ? `
            <div class="xabar-actions">
                <button class="action-btn btn-tasdiq" onclick="holatOzgartir(${x.id}, 'tasdiqlangan')"><i class="fas fa-check"></i> Tasdiqlash</button>
                <button class="action-btn btn-bekor" onclick="holatOzgartir(${x.id}, 'bekor_qilingan')"><i class="fas fa-times"></i> Bekor qilish</button>
                <button class="action-btn btn-javob" onclick="toggleJavob(${x.id})"><i class="fas fa-reply"></i> Javob yozish</button>
            </div>
            <div class="javob-form" id="jform-${x.id}">
                <textarea placeholder="Javob yozing..." id="jtxt-${x.id}"></textarea>
                <div class="javob-form-btns">
                    <button class="action-btn btn-tasdiq" onclick="javobYuborTasdiqlash(${x.id})"><i class="fas fa-paper-plane"></i> Javob yuborib tasdiqlash</button>
                    <button class="action-btn" style="background:#aaa;color:#fff" onclick="toggleJavob(${x.id})">Bekor</button>
                </div>
            </div>` : ''}
        </div>`).join('');
}

function toggleJavob(id) {
    const f = document.getElementById('jform-' + id);
    f.style.display = f.style.display === 'block' ? 'none' : 'block';
}

async function holatOzgartir(id, holat, javob) {
    const token = getToken();
    const body = { holat };
    if (javob) body.javob = javob;
    try {
        const res = await fetch('/api/xabarlar/' + id + '/holat/', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error();
        const idx = allXabarlar.findIndex(x => x.id === id);
        if (idx !== -1) {
            allXabarlar[idx].holat = holat;
            if (javob) allXabarlar[idx].javob = javob;
        }
        updateStats();
        renderList();
    } catch {
        alert('Xatolik yuz berdi');
    }
}

async function javobYuborTasdiqlash(id) {
    const javob = document.getElementById('jtxt-' + id).value.trim();
    if (!javob) { alert('Javob matnini kiriting'); return; }
    await holatOzgartir(id, 'tasdiqlangan', javob);
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        activeHolat = this.dataset.holat;
        renderList();
    });
});

document.getElementById('search-input').addEventListener('input', renderList);

// Auth check
const user = getUser();
const token = getToken();
if (!token || !user || user.role !== 'admin') {
    document.getElementById('access-denied').style.display = 'block';
} else {
    document.getElementById('main-content').style.display = 'block';
    loadXabarlar();
}
</script>
<script>requireAuth();</script>
<script src="{% static 'sidebar.js' %}"></script>
</body>
</html>
