{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart mahalla axborot tizimi - Kirish</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0d2257 0%, #1e3c72 50%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 45px 38px;
            width: 440px;
            max-width: 92%;
            box-shadow: 0 24px 60px rgba(0,0,0,0.35);
            text-align: center;
        }
        .logo { font-size: 56px; margin-bottom: 10px; }
        h1 { color: #1e3c72; font-size: 22px; font-weight: 800; margin-bottom: 28px; border-bottom: 3px solid #2a5298; display: inline-block; padding-bottom: 8px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 7px; color: #444; font-weight: 600; font-size: 13px; }
        .input-group input {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #dde3ef;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border .2s;
        }
        .input-group input:focus { border-color: #2a5298; }
        button {
            width: 100%;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: .3px;
        }
        button:hover { opacity: .9; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(30,60,114,.3); }
        .error-message {
            background: #fde8e8; color: #c0392b; padding: 12px;
            border-radius: 10px; margin-top: 18px; font-size: 14px;
            border-left: 4px solid #e74c3c; text-align: left;
        }
        .success-message {
            background: #e8f0fe; color: #1e3c72; padding: 12px;
            border-radius: 10px; margin-top: 18px; font-size: 14px;
            border-left: 4px solid #2a5298; text-align: left;
        }
        .demo-info {
            margin-top: 22px; padding-top: 18px; border-top: 1px solid #eee;
            font-size: 12px; color: #999; text-align: left;
        }
        .demo-info p { margin: 5px 0; }
        .demo-info strong { color: #2a5298; }
        .back-link { display: block; margin-top: 16px; color: #2a5298; text-decoration: none; font-size: 14px; font-weight: 500; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="login-container">
    <div class="logo">🏘️</div>
    <h1>Smart mahalla axborot tizimi</h1>

    <div class="input-group">
        <label>📧 Email</label>
        <input type="text" id="loginInput" placeholder="Emailingizni kiriting" autocomplete="off">
    </div>

    <div class="input-group">
        <label>🔒 Parol</label>
        <input type="password" id="passwordInput" placeholder="Parolingizni kiriting">
    </div>

    <button id="loginBtn">Kirish</button>

    <div id="messageBox"></div>

    <a href="{% url 'main' %}" class="back-link">← Bosh sahifaga qaytish</a>
</div>

<script src="{% static 'api.js' %}"></script>
<script src="{% static 'sidebar.js' %}"></script>
<script>
    const messageBox = document.getElementById('messageBox');

    async function doLogin() {
        const email = document.getElementById('loginInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();

        if (!email || !password) {
            messageBox.innerHTML = `<div class="error-message">❌ Iltimos, email va parolni to'ldiring!</div>`;
            return;
        }

        const btn = document.getElementById('loginBtn');
        btn.textContent = 'Kirilmoqda...';
        btn.disabled = true;

        try {
            const res = await fetch('/api/auth/login/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password }),
            });
            const data = await res.json();

            if (res.ok) {
                setAuth(data);
                messageBox.innerHTML = `<div class="success-message">✅ Xush kelibsiz, ${data.user.fullname}!</div>`;
                setTimeout(() => {
                    window.location.href = data.user.role === 'admin' ? '{% url "admin_panel" %}' : '{% url "murojaat" %}';
                }, 800);
            } else {
                messageBox.innerHTML = `<div class="error-message">❌ ${data.detail || "Email yoki parol xato!"}</div>`;
            }
        } catch (e) {
            messageBox.innerHTML = `<div class="error-message">❌ Server bilan ulanishda xatolik.</div>`;
        } finally {
            btn.textContent = 'Kirish';
            btn.disabled = false;
        }
    }

    document.getElementById('loginBtn').addEventListener('click', doLogin);
    ['loginInput', 'passwordInput'].forEach(id => {
        document.getElementById(id).addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
    });
</script>
</body>
</html>
