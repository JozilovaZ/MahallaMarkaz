version: '3.9'

services:
  web:
    build: .
    container_name: mahalla_web
    restart: always
    volumes:
      - sqlite_data:/app/db.sqlite3
      - static_files:/app/staticfiles
      - media_files:/app/media
    environment:
      - DEBUG=False
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
    expose:
      - "8000"
    depends_on: []

  nginx:
    image: nginx:alpine
    container_name: mahalla_nginx
    restart: always
    ports:
      - "70:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      - web

volumes:
  sqlite_data:
  static_files:
  media_files:
