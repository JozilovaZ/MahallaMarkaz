<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahalla — Mas'ul xodimlarga murojaat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6fb; color: #222; }

        /* ── HEADER ── */
        header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white; padding: 0 24px;
            display: flex; align-items: center; justify-content: space-between;
            height: 64px; position: sticky; top: 0; z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,.22);
        }
        .header-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: white; }
        .header-logo img { width: 38px; height: 38px; object-fit: contain; filter: brightness(1.1); }
        .logo-text strong { display: block; font-size: 16px; letter-spacing: .4px; }
        .logo-text span { font-size: 11px; opacity: .75; letter-spacing: .8px; }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .kabinet-btn {
            background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
            color: white; padding: 8px 18px; border-radius: 8px; text-decoration: none;
            font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 7px;
            transition: background .2s;
        }
        .kabinet-btn:hover { background: rgba(255,255,255,.25); }

        /* ── HERO ── */
        .hero {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 60%, #4a7fcb 100%);
            color: white; text-align: center; padding: 56px 24px 48px;
        }
        .hero h1 { font-size: 28px; font-weight: 800; margin-bottom: 14px; line-height: 1.3; }
        .hero p { font-size: 16px; opacity: .88; max-width: 520px; margin: 0 auto; line-height: 1.7; }

        /* ── RAHBARLAR ── */
        .section { max-width: 960px; margin: 0 auto; padding: 40px 20px; }
        .section-title {
            font-size: 20px; font-weight: 700; color: #1e3c72;
            margin-bottom: 24px; display: flex; align-items: center; gap: 10px;
        }
        .section-title::after {
            content: ''; flex: 1; height: 2px; background: #e0e8f5; border-radius: 2px;
        }

        .rahbarlar-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px;
        }
        .rahbar-card {
            background: white; border-radius: 14px; padding: 22px 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,.07); display: flex; flex-direction: column;
            gap: 14px; transition: transform .2s, box-shadow .2s; border-top: 3px solid #2a5298;
        }
        .rahbar-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(42,82,152,.13); }
        .card-top { display: flex; align-items: center; gap: 14px; }
        .card-avatar {
            width: 54px; height: 54px; border-radius: 50%; flex-shrink: 0;
            background: linear-gradient(135deg, #2a5298, #1e3c72);
            display: flex; align-items: center; justify-content: center; color: white; font-size: 22px;
        }
        .card-name { font-size: 15px; font-weight: 700; color: #1e3c72; line-height: 1.3; }
        .card-lavozim {
            display: inline-block; background: #e8f0fe; color: #2a5298;
            font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 10px; margin-top: 4px;
        }
        .card-tavsif { font-size: 13px; color: #666; line-height: 1.6; }
        .card-tel { font-size: 13px; color: #555; display: flex; align-items: center; gap: 6px; }
        .xabar-btn {
            width: 100%; padding: 11px; background: #2a5298; color: white; border: none;
            border-radius: 9px; font-size: 14px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px; transition: background .2s;
            text-decoration: none;
        }
        .xabar-btn:hover { background: #1e3c72; }

        /* ── MODAL ── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 500;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: white; border-radius: 16px; width: 100%; max-width: 480px;
            box-shadow: 0 24px 60px rgba(0,0,0,.25); overflow: hidden;
        }
        .modal-header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white; padding: 18px 22px; display: flex; align-items: center; justify-content: space-between;
        }
        .modal-header h3 { font-size: 17px; font-weight: 700; }
        .modal-close { background: rgba(255,255,255,.15); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; }
        .modal-close:hover { background: rgba(255,255,255,.3); }
        .modal-body { padding: 22px; }
        .modal-to { background: #f0f4ff; border-radius: 8px; padding: 10px 14px; margin-bottom: 18px; font-size: 14px; color: #2a5298; font-weight: 600; }
        .fg { margin-bottom: 14px; }
        .fg label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; font-weight: 500; }
        .fg input, .fg textarea {
            width: 100%; padding: 11px 13px; border: 1.5px solid #dde3ef;
            border-radius: 8px; font-size: 14px; outline: none; font-family: inherit; transition: border .2s;
        }
        .fg input:focus, .fg textarea:focus { border-color: #2a5298; }
        .fg textarea { resize: vertical; min-height: 100px; }
        .modal-send-btn {
            width: 100%; padding: 12px; background: #2a5298; color: white; border: none;
            border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background .2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .modal-send-btn:hover { background: #1e3c72; }
        .modal-send-btn:disabled { background: #9ab0d6; cursor: not-allowed; }
        .modal-alert { border-radius: 8px; padding: 10px 13px; font-size: 13px; margin-top: 12px; display: none; }
        .modal-alert.success { background: #d4edda; color: #155724; display: block; }
        .modal-alert.error   { background: #f8d7da; color: #721c24; display: block; }

        /* ── SKELETON ── */
        .skeleton { background: #e8edf5; border-radius: 8px; animation: pulse 1.4s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
        .sk-card { background: white; border-radius: 14px; padding: 22px; border-top: 3px solid #e0e8f5; }

        /* ── FOOTER ── */
        footer { text-align: center; padding: 24px; color: #999; font-size: 13px; border-top: 1px solid #e8edf5; margin-top: 20px; }

        @media(max-width:480px) {
            .hero h1 { font-size: 22px; }
            .header-logo .logo-text span { display: none; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <a class="header-logo" href="/">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/77/Emblem_of_Uzbekistan.svg/1200px-Emblem_of_Uzbekistan.svg.png" alt="Gerb">
        <div class="logo-text">
            <strong>MAHALLA SMART</strong>
            <span>AXBOROT TIZIMI</span>
        </div>
    </a>
    <div class="header-right">
        <a href="/kabinet/" class="kabinet-btn"><i class="fas fa-user-shield"></i> Mas'ul kabinet</a>
    </div>
</header>

<!-- HERO -->
<div class="hero">
    <h1><i class="fas fa-building-shield"></i> Mahalla mas'ul xodimlariga murojaat</h1>
    <p>Muammoingizga mos mas'ul shaxsni toping va unga bevosita xabar yuboring</p>
</div>

<!-- RAHBARLAR -->
<div class="section">
    <div class="section-title"><i class="fas fa-id-card"></i> Mas'ul xodimlar</div>
    <div class="rahbarlar-grid" id="rahbarlar-grid">
        <!-- skeleton -->
        <div class="sk-card"><div class="skeleton" style="height:54px;width:54px;border-radius:50%;margin-bottom:12px"></div><div class="skeleton" style="height:14px;margin-bottom:8px"></div><div class="skeleton" style="height:11px;width:60%"></div></div>
        <div class="sk-card"><div class="skeleton" style="height:54px;width:54px;border-radius:50%;margin-bottom:12px"></div><div class="skeleton" style="height:14px;margin-bottom:8px"></div><div class="skeleton" style="height:11px;width:60%"></div></div>
        <div class="sk-card"><div class="skeleton" style="height:54px;width:54px;border-radius:50%;margin-bottom:12px"></div><div class="skeleton" style="height:14px;margin-bottom:8px"></div><div class="skeleton" style="height:11px;width:60%"></div></div>
    </div>
</div>

<footer>
    <p>© 2026 Smart Mahalla Axborot Tizimi</p>
</footer>

<!-- XABAR MODAL -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <div class="modal-header">
            <h3><i class="fas fa-paper-plane"></i> Xabar yuborish</h3>
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <div class="modal-to" id="modal-to">—</div>
            <form id="xabar-form">
                <div class="fg">
                    <label>Ismingiz <span style="color:red">*</span></label>
                    <input type="text" id="f-ism" placeholder="To'liq ismingiz" required>
                </div>
                <div class="fg">
                    <label>Telefon raqamingiz</label>
                    <input type="tel" id="f-tel" placeholder="+998 90 123 45 67">
                </div>
                <div class="fg">
                    <label>Xabar <span style="color:red">*</span></label>
                    <textarea id="f-matn" placeholder="Muammoyingizni yozing..." required></textarea>
                </div>
                <button class="modal-send-btn" type="submit" id="send-btn">
                    <i class="fas fa-paper-plane"></i> Yuborish
                </button>
                <div class="modal-alert" id="modal-alert"></div>
            </form>
        </div>
    </div>
</div>

<script>
const ICONS = {
    rais: 'fa-user-tie', hokim_yordamchisi: 'fa-user-shield',
    yoshlar: 'fa-users', xotin_qizlar: 'fa-female',
    profilaktika: 'fa-shield-alt', boshqa: 'fa-user'
};

let joriyRahbarId = null;

async function loadRahbarlar() {
    const grid = document.getElementById('rahbarlar-grid');
    try {
        const res = await fetch('/api/rahbarlar/');
        const data = await res.json();
        if (!data.length) { grid.innerHTML = '<p style="color:#888">Ma\'lumot topilmadi</p>'; return; }
        grid.innerHTML = data.map(r => `
            <div class="rahbar-card">
                <div class="card-top">
                    <div class="card-avatar"><i class="fas ${ICONS[r.lavozim] || 'fa-user'}"></i></div>
                    <div>
                        <div class="card-name">${r.ismi}</div>
                        <span class="card-lavozim">${r.lavozim_display}</span>
                    </div>
                </div>
                ${r.lavozim_tavsifi ? `<div class="card-tavsif">${r.lavozim_tavsifi}</div>` : ''}
                ${r.telefon ? `<div class="card-tel"><i class="fas fa-phone" style="color:#2a5298"></i> ${r.telefon}</div>` : ''}
                <button class="xabar-btn" onclick="openModal(${r.id}, '${r.ismi}', '${r.lavozim_display}')">
                    <i class="fas fa-envelope"></i> Xabar yuborish
                </button>
            </div>`).join('');
    } catch {
        grid.innerHTML = '<p style="color:#e74c3c">Yuklashda xatolik yuz berdi</p>';
    }
}

function openModal(id, ism, lavozim) {
    joriyRahbarId = id;
    document.getElementById('modal-to').innerHTML = '<i class="fas fa-arrow-right"></i> ' + lavozim + ': <strong>' + ism + '</strong>';
    document.getElementById('xabar-form').reset();
    document.getElementById('modal-alert').className = 'modal-alert';
    document.getElementById('modal').classList.add('open');
}
function closeModal() {
    document.getElementById('modal').classList.remove('open');
    joriyRahbarId = null;
}
document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });

document.getElementById('xabar-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('send-btn');
    const alertEl = document.getElementById('modal-alert');
    alertEl.className = 'modal-alert';

    const ism  = document.getElementById('f-ism').value.trim();
    const tel  = document.getElementById('f-tel').value.trim();
    const matn = document.getElementById('f-matn').value.trim();
    if (!ism || !matn) { alertEl.className = 'modal-alert error'; alertEl.textContent = 'Ism va xabar matni kiritilishi shart!'; return; }

    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Yuborilmoqda...';
    try {
        const res = await fetch('/api/rahbarlar/' + joriyRahbarId + '/xabar/', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ yuboruvchi_ism: ism, yuboruvchi_telefon: tel, matn })
        });
        const data = await res.json();
        if (res.ok) {
            alertEl.className = 'modal-alert success';
            alertEl.textContent = 'Xabar muvaffaqiyatli yuborildi!';
            document.getElementById('xabar-form').reset();
            setTimeout(closeModal, 1800);
        } else { throw new Error(); }
    } catch { alertEl.className = 'modal-alert error'; alertEl.textContent = 'Xatolik yuz berdi. Qayta urinib ko\'ring.'; }
    btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane"></i> Yuborish';
});

loadRahbarlar();
</script>
</body>
</html>
