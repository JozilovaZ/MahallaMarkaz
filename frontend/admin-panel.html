<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart mahalla axborot tizimi | Admin Paneli</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .admin-header {
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .admin-header h1 { font-size: 1.8rem; display: flex; align-items: center; gap: 15px; }
        .admin-header h1 i { color: #ffd700; }
        .logout-button {
            background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 500; transition: background 0.3s;
        }
        .logout-button:hover { background: rgba(255,255,255,0.3); }
        .admin-container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .admin-section {
            background: white; border-radius: 15px; padding: 30px; margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }
        .section-title {
            font-size: 1.8rem; color: #2a5298; margin-bottom: 25px; padding-bottom: 15px;
            border-bottom: 2px solid #eaeaea; display: flex; align-items: center; gap: 10px;
        }
        .section-title i { color: #1e3c72; }
        .form-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .form-group { flex: 1; margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 10px;
            font-size: 1rem; font-family: 'Inter', sans-serif; transition: border-color 0.3s;
        }
        .form-group textarea { min-height: 120px; resize: vertical; }
        .form-group input:focus, .form-group textarea:focus { border-color: #2a5298; outline: none; }
        .add-button {
            background: linear-gradient(to right, #1e3c72, #2a5298); color: white; border: none;
            padding: 15px 30px; border-radius: 10px; font-size: 1.1rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 10px;
        }
        .add-button:hover { background: linear-gradient(to right, #2a5298, #3a62a8); transform: translateY(-2px); }
        .items-list { list-style: none; margin-top: 30px; }
        .item {
            background: #f9f9f9; border-radius: 10px; padding: 20px; margin-bottom: 15px;
            border-left: 4px solid #2a5298; display: flex; justify-content: space-between; align-items: flex-start;
        }
        .item-content h4 { font-size: 1.2rem; color: #2a5298; margin-bottom: 5px; }
        .item-content p { color: #555; margin-bottom: 8px; }
        .item-date { font-size: 0.9rem; color: #777; }
        .item-actions { display: flex; gap: 10px; }
        .edit-button, .delete-button {
            padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500;
            transition: all 0.2s;
        }
        .edit-button { background: #e3f2fd; color: #1976d2; }
        .edit-button:hover { background: #bbdefb; }
        .delete-button { background: #ffebee; color: #d32f2f; }
        .delete-button:hover { background: #ffcdd2; }
        .back-button {
            display: inline-block; background: #f0f0f0; color: #555; padding: 12px 25px;
            border-radius: 10px; text-decoration: none; font-weight: 500; margin-top: 20px;
            transition: background 0.3s;
        }
        .back-button:hover { background: #e0e0e0; }
        @media (max-width: 768px) {
            .form-row { flex-direction: column; gap: 0; }
            .item { flex-direction: column; }
            .item-actions { margin-top: 15px; justify-content: flex-end; }
        }
    </style>
</head>
<body>
    <header class="admin-header">
        <h1><i class="fas fa-user-shield"></i> Smart mahalla axborot tizimi - Admin Paneli</h1>
        <button class="logout-button" id="logoutButton"><i class="fas fa-sign-out-alt"></i> Chiqish</button>
    </header>

    <div class="admin-container">
        <!-- E'LON QO'SHISH -->
        <div class="admin-section">
            <h2 class="section-title"><i class="fas fa-bullhorn"></i> Yangi E'lon Qo'shish</h2>
            <form id="addAnnouncementForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="announcementTitle">E'lon sarlavhasi</label>
                        <input type="text" id="announcementTitle" placeholder="Masalan: Navro'z tadbiri" required>
                    </div>
                    <div class="form-group">
                        <label for="announcementDate">Sana (KK.OO.YYYY)</label>
                        <input type="text" id="announcementDate" placeholder="11.02.2026" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="announcementDescription">E'lon matni (ixtiyoriy)</label>
                    <textarea id="announcementDescription" placeholder="E'lonning to'liq matnini kiriting..."></textarea>
                </div>
                <button type="submit" class="add-button"><i class="fas fa-plus"></i> E'lonni qo'shish</button>
            </form>

            <h3 class="section-title" style="margin-top:40px; font-size:1.5rem;"><i class="fas fa-list"></i> Mavjud E'lonlar</h3>
            <ul class="items-list" id="announcementsList"></ul>
        </div>

        <!-- ISH O'RINI QO'SHISH -->
        <div class="admin-section">
            <h2 class="section-title"><i class="fas fa-briefcase"></i> Yangi Ish O'rini Qo'shish</h2>
            <form id="addJobForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="jobTitle">Ish o'rini nomi</label>
                        <input type="text" id="jobTitle" placeholder="Masalan: Farrosh" required>
                    </div>
                    <div class="form-group">
                        <label for="jobDeadline">Muddati (KK.OO.YYYY)</label>
                        <input type="text" id="jobDeadline" placeholder="25.02.2026" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="jobDescription">Ish tavsifi</label>
                    <textarea id="jobDescription" placeholder="Ishning batafsil tavsifini kiriting..." required></textarea>
                </div>
                <button type="submit" class="add-button"><i class="fas fa-plus"></i> Ish o'rnini qo'shish</button>
            </form>

            <h3 class="section-title" style="margin-top:40px; font-size:1.5rem;"><i class="fas fa-list"></i> Mavjud Ish O'rinlari</h3>
            <ul class="items-list" id="jobsList"></ul>
        </div>

        <a href="mxizmatlari.html" class="back-button"><i class="fas fa-arrow-left"></i> </a>
    </div>

    <script src="api.js"></script>
    <script>
        requireAdmin();

        // Sana formatini YYYY-MM-DD ga o'girish
        function parseDate(str) {
            // KK.OO.YYYY yoki YYYY-MM-DD
            if (!str) return '';
            if (str.includes('.')) {
                const [d, m, y] = str.split('.');
                return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
            }
            return str;
        }

        async function renderAnnouncements() {
            const res = await apiFetch('/elonlar/');
            if (!res || !res.ok) return;
            const items = await res.json();
            const list = document.getElementById('announcementsList');
            list.innerHTML = items.length ? '' : '<li style="color:#999;padding:10px">Hozircha e\'lon yo\'q</li>';
            items.forEach(item => {
                const li = document.createElement('li');
                li.className = 'item';
                li.innerHTML = `
                    <div class="item-content">
                        <h4>${item.sarlavha}</h4>
                        <p>${item.mazmun || ''}</p>
                        <span class="item-date">Sana: ${item.sana}</span>
                    </div>
                    <div class="item-actions">
                        <button class="delete-button" onclick="deleteAnnouncement(${item.id})"><i class="fas fa-trash"></i> O'chirish</button>
                    </div>`;
                list.appendChild(li);
            });
        }

        async function renderJobs() {
            const res = await apiFetch('/ishlar/');
            if (!res || !res.ok) return;
            const items = await res.json();
            const list = document.getElementById('jobsList');
            list.innerHTML = items.length ? '' : '<li style="color:#999;padding:10px">Hozircha ish o\'rni yo\'q</li>';
            items.forEach(item => {
                const li = document.createElement('li');
                li.className = 'item';
                li.innerHTML = `
                    <div class="item-content">
                        <h4>${item.sarlavha}</h4>
                        <p>${item.mazmun}</p>
                        <span class="item-date">Muddati: ${item.muddat}</span>
                    </div>
                    <div class="item-actions">
                        <button class="delete-button" onclick="deleteJob(${item.id})"><i class="fas fa-trash"></i> O'chirish</button>
                    </div>`;
                list.appendChild(li);
            });
        }

        document.getElementById('addAnnouncementForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const sarlavha = document.getElementById('announcementTitle').value.trim();
            const sana = parseDate(document.getElementById('announcementDate').value.trim());
            const mazmun = document.getElementById('announcementDescription').value.trim();
            if (!sarlavha || !sana) { alert('Sarlavha va sana majburiy!'); return; }
            const res = await apiFetch('/elonlar/', { method: 'POST', body: JSON.stringify({ sarlavha, sana, mazmun }) });
            if (res && res.ok) { this.reset(); renderAnnouncements(); alert("E'lon qo'shildi!"); }
            else { const e2 = await res.json(); alert(JSON.stringify(e2)); }
        });

        document.getElementById('addJobForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const sarlavha = document.getElementById('jobTitle').value.trim();
            const muddat = parseDate(document.getElementById('jobDeadline').value.trim());
            const mazmun = document.getElementById('jobDescription').value.trim();
            if (!sarlavha || !muddat || !mazmun) { alert("Barcha maydonlarni to'ldiring!"); return; }
            const res = await apiFetch('/ishlar/', { method: 'POST', body: JSON.stringify({ sarlavha, muddat, mazmun }) });
            if (res && res.ok) { this.reset(); renderJobs(); alert("Ish o'rni qo'shildi!"); }
            else { const e2 = await res.json(); alert(JSON.stringify(e2)); }
        });

        window.deleteAnnouncement = async function (id) {
            if (!confirm("Bu e'lonni o'chirishni istaysizmi?")) return;
            await apiFetch('/elonlar/' + id + '/', { method: 'DELETE' });
            renderAnnouncements();
        };

        window.deleteJob = async function (id) {
            if (!confirm("Bu ish o'rnini o'chirishni istaysizmi?")) return;
            await apiFetch('/ishlar/' + id + '/', { method: 'DELETE' });
            renderJobs();
        };

        document.getElementById('logoutButton').addEventListener('click', function () {
            if (confirm('Admin panelidan chiqishni istaysizmi?')) logout();
        });

        renderAnnouncements();
        renderJobs();
    </script>
</body>
</html>
