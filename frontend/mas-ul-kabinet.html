<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xabarlar — Kabinet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f4f8; min-height: 100vh; }

        /* LOGIN */
        .login-wrap {
            min-height: 100vh; display: flex; align-items: center;
            justify-content: center; background: linear-gradient(135deg, #1e3c72, #2a5298);
        }
        .login-box {
            background: white; border-radius: 16px; padding: 40px 36px;
            width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }
        .login-box h2 { text-align: center; color: #1e3c72; margin-bottom: 6px; font-size: 22px; }
        .login-box p  { text-align: center; color: #888; font-size: 14px; margin-bottom: 26px; }
        .fg { margin-bottom: 16px; }
        .fg label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; font-weight: 500; }
        .fg input {
            width: 100%; padding: 12px 14px; border: 1.5px solid #dde3ef;
            border-radius: 8px; font-size: 15px; outline: none; transition: border .2s;
        }
        .fg input:focus { border-color: #2a5298; }
        .login-btn {
            width: 100%; padding: 13px; background: #2a5298; color: white;
            border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .login-btn:hover { background: #1e3c72; }
        .login-err { color: #c0392b; font-size: 14px; margin-top: 10px; text-align: center; display: none; }

        /* KONTENT */
        .kb-wrap { display: none; padding: 28px; }
        .page-title { font-size: 20px; font-weight: 700; color: #1e3c72; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 22px; }
        .stat-card { background: white; border-radius: 12px; padding: 16px 18px; box-shadow: 0 2px 8px rgba(0,0,0,.07); display: flex; align-items: center; gap: 14px; }
        .stat-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .stat-icon.orange { background: #fef3e2; color: #e67e22; }
        .stat-icon.green  { background: #e8f8f0; color: #27ae60; }
        .stat-icon.red    { background: #fdeaea; color: #e74c3c; }
        .stat-num { font-size: 24px; font-weight: 800; line-height: 1; }
        .stat-lbl { font-size: 12px; color: #888; margin-top: 2px; }

        .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-btn { padding: 7px 16px; border-radius: 20px; border: 2px solid #dde3ef; background: white; font-size: 13px; cursor: pointer; font-weight: 500; color: #555; transition: all .2s; }
        .filter-btn.active { background: #2a5298; border-color: #2a5298; color: white; }

        .xabarlar-list { display: flex; flex-direction: column; gap: 12px; }
        .xabar-card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.07); overflow: hidden; }
        .xabar-card.kutilmoqda    { border-left: 4px solid #e67e22; }
        .xabar-card.tasdiqlangan  { border-left: 4px solid #27ae60; }
        .xabar-card.bekor_qilingan{ border-left: 4px solid #e74c3c; }

        .xabar-top { padding: 14px 18px; display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
        .xabar-kim  { font-size: 15px; font-weight: 700; color: #1e3c72; }
        .xabar-tel  { font-size: 13px; color: #666; margin-top: 3px; }
        .xabar-vaqt { font-size: 12px; color: #aaa; white-space: nowrap; }
        .xabar-matn { padding: 0 18px 12px; font-size: 14px; color: #444; line-height: 1.6; }

        .holat-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 11px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .holat-badge.kutilmoqda    { background: #fef3e2; color: #e67e22; }
        .holat-badge.tasdiqlangan  { background: #e8f8f0; color: #27ae60; }
        .holat-badge.bekor_qilingan{ background: #fdeaea; color: #e74c3c; }

        .xabar-actions { padding: 0 18px 14px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .javob-input { flex: 1; min-width: 180px; padding: 8px 12px; border: 1.5px solid #dde3ef; border-radius: 8px; font-size: 13px; outline: none; font-family: inherit; }
        .javob-input:focus { border-color: #2a5298; }
        .action-btn { padding: 7px 16px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .tasdiq-btn { background: #e8f8f0; color: #27ae60; }
        .tasdiq-btn:hover { background: #27ae60; color: white; }
        .bekor-btn  { background: #fdeaea; color: #e74c3c; }
        .bekor-btn:hover  { background: #e74c3c; color: white; }
        .javob-blok { margin: 0 18px 14px; background: #f0f4ff; border-radius: 8px; padding: 9px 12px; font-size: 13px; color: #2a5298; border-left: 3px solid #2a5298; }

        .empty { text-align: center; padding: 50px 20px; color: #bbb; }
        .empty i { font-size: 44px; display: block; margin-bottom: 12px; }

        @media(max-width:600px){ .stats{ grid-template-columns:1fr 1fr; } }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-ekran">
    <div class="login-box">
        <h2><i class="fas fa-user-shield"></i> Kabinet</h2>
        <p>Mas'ul xodim sifatida kiring</p>
        <div class="fg"><label>Email</label><input type="email" id="f-email" placeholder="email@oltogil.uz"></div>
        <div class="fg"><label>Parol</label><input type="password" id="f-parol" placeholder="Parolingiz"></div>
        <button class="login-btn" id="login-btn"><i class="fas fa-sign-in-alt"></i> Kirish</button>
        <div class="login-err" id="login-err"></div>
    </div>
</div>

<!-- KABINET -->
<div class="kb-wrap" id="kb-wrap">
    <div class="page-title"><i class="fas fa-inbox"></i> Mening xabarlarim</div>

    <div class="stats">
        <div class="stat-card"><div class="stat-icon orange"><i class="fas fa-clock"></i></div><div><div class="stat-num" id="st-k">0</div><div class="stat-lbl">Kutilmoqda</div></div></div>
        <div class="stat-card"><div class="stat-icon green"><i class="fas fa-check-circle"></i></div><div><div class="stat-num" id="st-t">0</div><div class="stat-lbl">Tasdiqlangan</div></div></div>
        <div class="stat-card"><div class="stat-icon red"><i class="fas fa-times-circle"></i></div><div><div class="stat-num" id="st-b">0</div><div class="stat-lbl">Bekor qilingan</div></div></div>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" data-f="hammasi">Hammasi</button>
        <button class="filter-btn" data-f="kutilmoqda">Kutilmoqda</button>
        <button class="filter-btn" data-f="tasdiqlangan">Tasdiqlangan</button>
        <button class="filter-btn" data-f="bekor_qilingan">Bekor qilingan</button>
    </div>

    <div class="xabarlar-list" id="xabarlar-list">
        <div class="empty"><i class="fas fa-spinner fa-spin"></i>Yuklanmoqda...</div>
    </div>
</div>

<script>
// api.js bilan bir xil localStorage kalitlarini ishlatamiz
const TOKEN_KEY = 'access_token';
const USER_KEY  = 'current_user';

let token  = localStorage.getItem(TOKEN_KEY);
let filter = 'hammasi';
let xabarlar = [];

// Sahifa ochilganda
if (token) {
    checkAndShow();
}

// Login
document.getElementById('login-btn').addEventListener('click', login);
document.getElementById('f-parol').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

async function login() {
    const email = document.getElementById('f-email').value.trim();
    const parol = document.getElementById('f-parol').value;
    const err   = document.getElementById('login-err');
    err.style.display = 'none';
    if (!email || !parol) { err.textContent = 'Email va parolni kiriting'; err.style.display = 'block'; return; }

    const btn = document.getElementById('login-btn');
    btn.textContent = 'Kirish...'; btn.disabled = true;
    try {
        const res  = await fetch('/api/auth/login/', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email, password: parol}) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Xatolik');
        if (data.user.role === 'resident') throw new Error("Sizda kabinet kirish huquqi yo'q");

        token = data.access;
        localStorage.setItem(TOKEN_KEY, data.access);
        localStorage.setItem('refresh_token', data.refresh);
        localStorage.setItem(USER_KEY, JSON.stringify(data.user));
        showKabinet();
        loadXabarlar();
    } catch(e) {
        err.textContent = e.message; err.style.display = 'block';
    }
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Kirish'; btn.disabled = false;
}

async function checkAndShow() {
    try {
        const res = await fetch('/api/auth/me/', { headers:{ Authorization:'Bearer '+token } });
        if (!res.ok) { clearAuth(); return; }
        const user = await res.json();
        if (user.role === 'resident') { clearAuth(); return; }
        localStorage.setItem(USER_KEY, JSON.stringify(user));
        showKabinet();
        loadXabarlar();
    } catch { clearAuth(); }
}

function showKabinet() {
    document.getElementById('login-ekran').style.display = 'none';
    document.getElementById('kb-wrap').style.display     = 'block';
}

function clearAuth() {
    localStorage.removeItem(TOKEN_KEY); localStorage.removeItem('refresh_token'); localStorage.removeItem(USER_KEY);
    token = null;
    document.getElementById('login-ekran').style.display = 'flex';
    document.getElementById('kb-wrap').style.display     = 'none';
}

// Xabarlarni yuklash
async function loadXabarlar() {
    const el = document.getElementById('xabarlar-list');
    el.innerHTML = '<div class="empty"><i class="fas fa-spinner fa-spin"></i><br>Yuklanmoqda...</div>';
    try {
        const res = await fetch('/api/mening-xabarlarim/', { headers:{ Authorization:'Bearer '+token } });
        if (res.status === 403) { el.innerHTML = '<div class="empty"><i class="fas fa-exclamation-circle"></i><br>Rahbar profili ulangan emas.</div>'; return; }
        if (!res.ok) throw new Error();
        xabarlar = await res.json();
        renderStats(); renderXabarlar();
    } catch {
        el.innerHTML = '<div class="empty"><i class="fas fa-wifi"></i><br>Yuklashda xatolik</div>';
    }
}

function renderStats() {
    document.getElementById('st-k').textContent = xabarlar.filter(x=>x.holat==='kutilmoqda').length;
    document.getElementById('st-t').textContent = xabarlar.filter(x=>x.holat==='tasdiqlangan').length;
    document.getElementById('st-b').textContent = xabarlar.filter(x=>x.holat==='bekor_qilingan').length;
}

function renderXabarlar() {
    const el   = document.getElementById('xabarlar-list');
    const list = filter === 'hammasi' ? xabarlar : xabarlar.filter(x=>x.holat===filter);
    if (!list.length) { el.innerHTML = '<div class="empty"><i class="fas fa-inbox"></i><br>Xabarlar yo\'q</div>'; return; }
    const icons = { kutilmoqda:'fa-clock', tasdiqlangan:'fa-check-circle', bekor_qilingan:'fa-times-circle' };
    el.innerHTML = list.map(x => {
        const vaqt = new Date(x.yuborilgan_vaqt).toLocaleString('uz-UZ',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
        const tugma = x.holat==='kutilmoqda' ? `
            <div class="xabar-actions">
                <input class="javob-input" id="j-${x.id}" placeholder="Javob (ixtiyoriy)...">
                <button class="action-btn tasdiq-btn" onclick="holatOzgartir(${x.id},'tasdiqlangan')"><i class="fas fa-check"></i> Tasdiqlash</button>
                <button class="action-btn bekor-btn"  onclick="holatOzgartir(${x.id},'bekor_qilingan')"><i class="fas fa-times"></i> Bekor qilish</button>
            </div>` : (x.javob ? `<div class="javob-blok"><small style="color:#888">Javob:</small><br>${x.javob}</div>` : '');
        return `<div class="xabar-card ${x.holat}">
            <div class="xabar-top">
                <div><div class="xabar-kim"><i class="fas fa-user"></i> ${x.yuboruvchi_ism}</div>${x.yuboruvchi_telefon?`<div class="xabar-tel"><i class="fas fa-phone"></i> ${x.yuboruvchi_telefon}</div>`:''}</div>
                <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
                    <span class="holat-badge ${x.holat}"><i class="fas ${icons[x.holat]}"></i> ${x.holat_display}</span>
                    <span class="xabar-vaqt">${vaqt}</span>
                </div>
            </div>
            <div class="xabar-matn">${x.matn}</div>${tugma}
        </div>`;
    }).join('');
}

async function holatOzgartir(id, holat) {
    const javob = document.getElementById('j-'+id)?.value || '';
    try {
        const res = await fetch('/api/xabarlar/'+id+'/holat/', {
            method:'PATCH', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
            body: JSON.stringify({holat, javob})
        });
        if (!res.ok) throw new Error();
        const yangi = await res.json();
        const i = xabarlar.findIndex(x=>x.id===id);
        if (i!==-1) xabarlar[i] = yangi;
        renderStats(); renderXabarlar();
    } catch { alert('Xatolik yuz berdi'); }
}

document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
        this.classList.add('active'); filter = this.dataset.f; renderXabarlar();
    });
});
</script>
<script src="/static/sidebar.js"></script>
</body>
</html>
